<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập Cổng Sinh Viên</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 340px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        button:hover { background: #2980b9; }
        .error-msg { color: #e74c3c; background: #fde8e7; padding: 10px; border-radius: 4px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>CỔNG THÔNG TIN SINH VIÊN</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p class="error-msg">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}
        <form action="/login" method="POST">
            <label>Mã sinh viên / Tài khoản:</label>
            <input type="text" name="username" required placeholder="Ví dụ: sinhvien1">
            <label>Mật khẩu:</label>
            <input type="password" name="password" required placeholder="Nhập mật khẩu...">
            <button type="submit">ĐĂNG NHẬP</button>
        </form>
    </div>
</body>
</html>
